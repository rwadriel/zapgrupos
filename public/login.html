<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAG GRUPOS — Login</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#eef2ee; --paper:#0c0e0d; --panel:#181c1a; --line:#2a302c; --input:#232826; --green:#c9f15b; --green-deep:#b3dc48; --green-ink:#1b2506; --green-soft:rgba(201,241,91,.15); --red:#f07a6c; --muted:#939d96; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; display:grid; place-items:center; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:36px 32px; width:360px; max-width:90vw; box-shadow:0 14px 40px -14px rgba(0,0,0,.55); text-align:center; }
  .glyph { width:76px; height:76px; object-fit:contain; display:inline-block; margin-bottom:12px; }
  h1 { font-family:'Space Grotesk'; font-size:22px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
  p { font-size:13.5px; color:var(--muted); margin-bottom:24px; }
  input { width:100%; padding:12px 14px; font:inherit; font-size:15px; background:var(--input); border:1px solid var(--line); border-radius:10px; color:var(--ink); margin-bottom:16px; color-scheme:dark; }
  input::placeholder { color:#6b756e; }
  input:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft); }
  button { width:100%; padding:13px; border:none; border-radius:10px; background:var(--green); color:var(--green-ink); font:inherit; font-family:'Space Grotesk'; font-size:15px; font-weight:700; cursor:pointer; }
  button:hover { background:var(--green-deep); }
  button:disabled { background:var(--line); color:var(--muted); cursor:not-allowed; }
  .err { color:var(--red); font-size:13px; margin-bottom:12px; min-height:18px; }
</style>
</head>
<body>
<div class="card">
  <img class="glyph" src="/logo.svg" alt="ZAG Grupos">
  <h1>ZAG GRUPOS</h1>
  <p>Digite a senha para acessar o painel.</p>
  <div class="err" id="err"></div>
  <input type="password" id="pw" placeholder="Senha" autofocus>
  <button id="btn">Entrar</button>
</div>
<script>
const btn = document.getElementById('btn'), pw = document.getElementById('pw'), err = document.getElementById('err');
async function login() {
  btn.disabled = true; btn.textContent = 'Verificando…'; err.textContent = '';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ senha: pw.value }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Senha incorreta.');
    window.location.reload();
  } catch(e) { err.textContent = e.message; }
  finally { btn.disabled = false; btn.textContent = 'Entrar'; }
}
btn.addEventListener('click', login);
pw.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
